<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM con Js</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .resaltar{
            background-color: blueviolet;
            color: white;
            font-size: 20px;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="row mt-3 mb-3">
            <div class="col">
                <h1 id="titulo">Hola mundo!</h1>
                <button id="boton-cambiar-titulo" class="btn btn-primary">Cambiar texto</button>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <p class="texto">Parrafo uno</p>
                <p class="texto">Parrafo dos</p>
                <p class="texto">Parrafo tres</p>
                <button id="boton-cambiar-parrafos" class="btn btn-primary">Cambiar parrafos</button>
                <button id="boton-cambiar-parrafos2" class="btn btn-primary">Cambiar parrafos2</button>
                <button id="boton-cambiar-parrafos3" class="btn btn-primary">Cambiar parrafos3</button>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <h3>Obtención y manipulación de texto y valores</h3>
                <p id="mensaje">Esto es un mensaje</p>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col">
                <h3>Obtener datos de los inputs</h3>
                <div>
                    <input id="num-uno" type="number">
                    <input id="num-dos" type="number">
                    <button id="btn-mostrar-suma" class="btn btn-primary">Sumar</button>
                </div>
                <div>
                    <p id="resultado-suma" class="mt-3"></p>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
